name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Guard - storageState.json must not be tracked
        run: |
          if git ls-files --error-unmatch storageState.json 2>/dev/null; then
            echo "ERROR: storageState.json is tracked by git. Remove it and add to .gitignore."
            exit 1
          fi
          echo "storageState.json is not tracked - OK"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data-validation/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r data-validation/requirements.txt

      - name: Pytest collect-only sanity check
        run: python -m pytest data-validation/ --collect-only -q

  test-ui:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: lint-format
    continue-on-error: ${{ github.event_name == 'schedule' }}
    env:
      RHOMBUS_BASE_URL: ${{ secrets.RHOMBUS_BASE_URL }}
      RHOMBUS_API_URL: ${{ secrets.RHOMBUS_API_URL }}
      RHOMBUS_EMAIL: ${{ secrets.RHOMBUS_EMAIL }}
      RHOMBUS_PASSWORD: ${{ secrets.RHOMBUS_PASSWORD }}
      RHOMBUS_TEST_PROJECT_ID: ${{ secrets.RHOMBUS_TEST_PROJECT_ID }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data-validation/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r data-validation/requirements.txt

      - name: Run auth setup
        run: npx playwright test --project=setup

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (traces, videos, screenshots)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-ui
          path: test-results/
          retention-days: 7

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-ui
          path: junit.xml
          retention-days: 14

      - name: Upload downloaded CSV artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-csvs-ui
          path: artifacts/
          retention-days: 7

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint-format
    env:
      RHOMBUS_BASE_URL: ${{ secrets.RHOMBUS_BASE_URL }}
      RHOMBUS_API_URL: ${{ secrets.RHOMBUS_API_URL }}
      RHOMBUS_EMAIL: ${{ secrets.RHOMBUS_EMAIL }}
      RHOMBUS_PASSWORD: ${{ secrets.RHOMBUS_PASSWORD }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run auth setup
        run: npx playwright test --project=setup

      - name: Run API tests
        run: npm run test:api

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-api
          path: test-results/
          retention-days: 7

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-api
          path: junit.xml
          retention-days: 14

  validate:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: lint-format
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data-validation/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r data-validation/requirements.txt

      - name: Run data validator CLI
        run: python data-validation/validate_output.py --input fixtures/input/messy.csv --output fixtures/output/expected.csv

      - name: Run pytest validation suite
        run: python -m pytest data-validation/ -v --tb=short

      - name: Write validation summary to GitHub Step Summary
        if: always()
        run: |
          python -m pytest data-validation/ -v --tb=short --no-header -q 2>&1 | tee validation-report.txt
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat validation-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: validation-report.txt
          retention-days: 30

  report-aggr:
    name: Report Aggregation
    runs-on: ubuntu-latest
    needs: [test-ui, test-api, validate]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| test-ui | ${{ needs.test-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| test-api | ${{ needs.test-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any required job failed
        if: |
          needs.test-ui.result == 'failure' ||
          needs.test-api.result == 'failure' ||
          needs.validate.result == 'failure'
        run: |
          echo "One or more jobs failed. See individual job logs above."
          exit 1
