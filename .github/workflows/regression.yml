name: Nightly Regression

on:
  # 06:00 UTC - low-load window that gives a full US business day to triage.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  setup:
    name: Auth Setup
    runs-on: ubuntu-latest
    env:
      RHOMBUS_BASE_URL: ${{ secrets.RHOMBUS_BASE_URL }}
      RHOMBUS_API_URL: ${{ secrets.RHOMBUS_API_URL }}
      RHOMBUS_EMAIL: ${{ secrets.RHOMBUS_EMAIL }}
      RHOMBUS_PASSWORD: ${{ secrets.RHOMBUS_PASSWORD }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run auth setup
        run: npx playwright test --project=setup

  regression-ui:
    # Soft failure: opens a prod-drift issue on failure without blocking the pipeline.
    name: UI Regression
    runs-on: ubuntu-latest
    needs: setup
    continue-on-error: true
    env:
      RHOMBUS_BASE_URL: ${{ secrets.RHOMBUS_BASE_URL }}
      RHOMBUS_API_URL: ${{ secrets.RHOMBUS_API_URL }}
      RHOMBUS_EMAIL: ${{ secrets.RHOMBUS_EMAIL }}
      RHOMBUS_PASSWORD: ${{ secrets.RHOMBUS_PASSWORD }}
      RHOMBUS_TEST_PROJECT_ID: ${{ secrets.RHOMBUS_TEST_PROJECT_ID }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data-validation/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r data-validation/requirements.txt

      - name: Run auth setup
        run: npx playwright test --project=setup

      - name: Run UI tests
        id: ui-tests
        run: npm run test:ui
        continue-on-error: true

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-report-ui
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-results-ui
          path: test-results/
          retention-days: 7

  regression-api:
    name: API Regression
    runs-on: ubuntu-latest
    needs: setup
    env:
      RHOMBUS_BASE_URL: ${{ secrets.RHOMBUS_BASE_URL }}
      RHOMBUS_API_URL: ${{ secrets.RHOMBUS_API_URL }}
      RHOMBUS_EMAIL: ${{ secrets.RHOMBUS_EMAIL }}
      RHOMBUS_PASSWORD: ${{ secrets.RHOMBUS_PASSWORD }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run auth setup
        run: npx playwright test --project=setup

      - name: Run API tests
        run: npm run test:api

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-playwright-report-api
          path: playwright-report/
          retention-days: 14

  regression-validate:
    name: Validation Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'data-validation/requirements.txt'

      - name: Install Python dependencies
        run: pip install -r data-validation/requirements.txt

      - name: Run validation
        run: python data-validation/validate_output.py --input fixtures/input/messy.csv --output fixtures/output/expected.csv

      - name: Run pytest
        run: python -m pytest data-validation/ -v --tb=short

  notify-on-drift:
    name: Open Issue on UI Failure
    runs-on: ubuntu-latest
    needs: [regression-ui]
    if: needs.regression-ui.result == 'failure'
    steps:
      - uses: actions/checkout@v4

      - name: Open GitHub Issue for prod drift
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['prod-drift'],
              state: 'open',
            });

            const title = `[prod-drift] Nightly UI regression failed - ${new Date().toISOString().slice(0, 10)}`;

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The nightly regression UI suite failed at ${new Date().toISOString()}.\n\nPlease investigate the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) and determine if this is a real prod regression.\n\nSee the uploaded artifacts for traces, videos, and the HTML report.`,
                labels: ['prod-drift'],
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: `Nightly regression still failing as of ${new Date().toISOString()}.\nWorkflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              });
            }
